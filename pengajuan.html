<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Pengajuan — Monitoring Perbaikan Jalan</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .filter-bar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:16px; }
  .filter-bar input, .filter-bar select {
    background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px;
    padding: 8px 12px; font-size: 13px; font-family: 'Sora', sans-serif;
    color: var(--text); outline: none;
  }
  .filter-bar input:focus, .filter-bar select:focus { border-color: var(--blue-light); }
  .filter-bar input { width: 240px; }
  .count-info { font-size: 12px; color: var(--text-soft); margin-bottom: 12px; }

  /* Detail modal */
  .detail-row { display:grid; grid-template-columns:130px 1fr; gap:8px 12px; font-size:13px; }
  .detail-row dt { color:var(--text-soft); font-weight:500; padding-top:2px; }
  .detail-row dd { color:var(--text); }
  .detail-divider { grid-column:1/-1; border-top:1px solid var(--border); margin:6px 0; }

  /* Status form */
  .status-select-wrap { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .status-opt {
    border: 2px solid var(--border); border-radius: 10px;
    padding: 12px; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500;
  }
  .status-opt:hover { border-color: var(--blue-light); background: var(--blue-pale); }
  .status-opt.selected { border-color: var(--blue); background: var(--blue-pale); }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>
<div class="sidebar" id="sidebar"></div>
<div class="main">
  <div class="topbar" id="topbar"></div>
  <div class="content">

    <div class="card">
      <div class="card-head">
        <div class="card-head-title">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Data Pengajuan Perbaikan Jalan
        </div>
        <a href="tambah.html" class="btn btn-primary btn-sm">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Tambah
        </a>
      </div>
      <div class="card-body">
        <div class="filter-bar">
          <input type="text" id="searchInput" placeholder="🔍  Cari no. pengajuan / nama / lokasi...">
          <select id="filterStatus">
            <option value="">Semua Status</option>
            <option value="Pending">Pending</option>
            <option value="Diproses">Diproses</option>
            <option value="Selesai">Selesai</option>
            <option value="Ditolak">Ditolak</option>
          </select>
          <select id="filterJenis">
            <option value="">Semua Jenis</option>
            <option value="Berlubang">Berlubang</option>
            <option value="Retak">Retak</option>
            <option value="Longsor">Longsor</option>
            <option value="Banjir">Banjir</option>
            <option value="Lainnya">Lainnya</option>
          </select>
          <button class="btn btn-secondary btn-sm" onclick="resetFilter()">Reset</button>
        </div>
        <p class="count-info" id="countInfo"></p>
        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>No</th>
                <th>No. Pengajuan</th>
                <th>Nama Pelapor</th>
                <th>Lokasi</th>
                <th>Kecamatan</th>
                <th>Jenis Kerusakan</th>
                <th>Tingkat</th>
                <th>Status</th>
                <th>Tanggal</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="mainTbody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Modal Detail -->
<div class="modal-overlay" id="modalDetail">
  <div class="modal" style="max-width:580px;">
    <div class="modal-head">
      <h3>Detail Pengajuan</h3>
      <button class="modal-close" onclick="closeModal('modalDetail')">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="detailContent"></div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModal('modalDetail')">Tutup</button>
      <button class="btn btn-primary" id="btnUpdateStatus" style="display:none;" onclick="openUpdateFromDetail()">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Update Status
      </button>
    </div>
  </div>
</div>

<!-- Modal Update Status -->
<div class="modal-overlay" id="modalUpdate">
  <div class="modal" style="max-width:460px;">
    <div class="modal-head">
      <h3>Update Status Pengajuan</h3>
      <button class="modal-close" onclick="closeModal('modalUpdate')">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--text-soft);margin-bottom:16px;">
        Pengajuan: <strong id="updateNoPengajuan" style="color:var(--blue);font-family:'JetBrains Mono',monospace;"></strong>
      </p>
      <div class="status-select-wrap" id="statusOpts"></div>
      <div class="form-group">
        <label>Catatan Admin</label>
        <textarea id="catatanAdmin" rows="3" placeholder="Tambahkan catatan atau keterangan..."></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModal('modalUpdate')">Batal</button>
      <button class="btn btn-primary" onclick="saveStatus()">
        <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
        Simpan
      </button>
    </div>
  </div>
</div>

<!-- Modal Konfirmasi Hapus -->
<div class="modal-overlay" id="modalHapus">
  <div class="modal" style="max-width:380px;">
    <div class="modal-head">
      <h3>Konfirmasi Hapus</h3>
      <button class="modal-close" onclick="closeModal('modalHapus')">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <p style="font-size:14px;">Yakin ingin menghapus pengajuan <strong id="hapusNo" style="color:var(--red);"></strong>?</p>
      <p style="font-size:13px;color:var(--text-soft);margin-top:8px;">Data yang dihapus tidak dapat dikembalikan.</p>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModal('modalHapus')">Batal</button>
      <button class="btn btn-danger" onclick="confirmHapus()">
        <svg viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Hapus
      </button>
    </div>
  </div>
</div>

<div id="toast" style="position:fixed;bottom:24px;right:24px;background:var(--navy);color:white;padding:12px 20px;border-radius:10px;font-size:13px;z-index:9999;display:none;box-shadow:0 8px 24px rgba(0,0,0,0.2);"></div>

<script src="app.js"></script>
<script>
  if (!requireLogin()) throw new Error();
  renderSidebar('pengajuan');
  renderTopbar('Data Pengajuan', 'Kelola semua data pengajuan perbaikan jalan');

  let currentId = null;
  let selectedStatus = null;

  // ---- Render table ----
  function renderTable() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const statusF = document.getElementById('filterStatus').value;
    const jenisF = document.getElementById('filterJenis').value;

    let data = getData();
    if (search) data = data.filter(x =>
      x.no_pengajuan.toLowerCase().includes(search) ||
      x.nama_pelapor.toLowerCase().includes(search) ||
      x.lokasi.toLowerCase().includes(search) ||
      x.kecamatan.toLowerCase().includes(search)
    );
    if (statusF) data = data.filter(x => x.status === statusF);
    if (jenisF) data = data.filter(x => x.jenis_kerusakan === jenisF);
    data.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

    document.getElementById('countInfo').textContent = `Menampilkan ${data.length} data`;
    const tbody = document.getElementById('mainTbody');

    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="10"><div class="empty-state"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>Tidak ada data yang sesuai filter</p></div></td></tr>`;
      return;
    }

    tbody.innerHTML = data.map((r, i) => `
      <tr>
        <td style="color:var(--text-soft);">${i+1}</td>
        <td><span class="text-mono" style="color:var(--blue);font-weight:600;">${r.no_pengajuan}</span></td>
        <td style="font-size:13px;">${r.nama_pelapor}</td>
        <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;" title="${r.lokasi}">${r.lokasi}</td>
        <td style="font-size:12px;">${r.kecamatan}</td>
        <td><span style="font-size:12px;background:var(--bg);padding:2px 8px;border-radius:4px;">${r.jenis_kerusakan}</span></td>
        <td>${renderBadgeTingkat(r.tingkat_kerusakan)}</td>
        <td>${renderBadgeStatus(r.status)}</td>
        <td class="text-muted no-wrap">${fmtDate(r.created_at)}</td>
        <td class="no-wrap">
          <button class="btn btn-info btn-sm" onclick="openDetail(${r.id})" title="Detail">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          ${isAdmin() ? `
          <button class="btn btn-warning btn-sm" onclick="openUpdate(${r.id})" title="Update Status">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn btn-danger btn-sm" onclick="openHapus(${r.id})" title="Hapus">
            <svg viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>` : ''}
        </td>
      </tr>
    `).join('');
  }

  // ---- Detail ----
  function openDetail(id) {
    const d = getData().find(x => x.id === id);
    if (!d) return;
    currentId = id;
    document.getElementById('detailContent').innerHTML = `
      <dl class="detail-row">
        <dt>No. Pengajuan</dt>
        <dd><span class="text-mono" style="color:var(--blue);font-weight:600;">${d.no_pengajuan}</span></dd>
        <dt>Tanggal</dt>
        <dd>${fmtDateFull(d.created_at)}</dd>
        <div class="detail-divider"></div>
        <dt>Nama Pelapor</dt><dd>${d.nama_pelapor}</dd>
        <dt>No. HP</dt><dd>${d.no_hp || '-'}</dd>
        <div class="detail-divider"></div>
        <dt>Lokasi</dt><dd>${d.lokasi}</dd>
        <dt>Kecamatan</dt><dd>${d.kecamatan}</dd>
        <dt>Kelurahan</dt><dd>${d.kelurahan}</dd>
        <div class="detail-divider"></div>
        <dt>Jenis Kerusakan</dt><dd>${d.jenis_kerusakan}</dd>
        <dt>Tingkat</dt><dd>${renderBadgeTingkat(d.tingkat_kerusakan)}</dd>
        <dt>Deskripsi</dt><dd>${d.deskripsi || '-'}</dd>
        <div class="detail-divider"></div>
        <dt>Status</dt><dd>${renderBadgeStatus(d.status)}</dd>
        <dt>Catatan Admin</dt><dd>${d.catatan_admin || '-'}</dd>
      </dl>
    `;
    document.getElementById('btnUpdateStatus').style.display = isAdmin() ? 'flex' : 'none';
    document.getElementById('modalDetail').classList.add('show');
  }

  function openUpdateFromDetail() {
    closeModal('modalDetail');
    setTimeout(() => openUpdate(currentId), 200);
  }

  // ---- Update Status ----
  const statusOpts = [
    { val: 'Pending', color: '#f5a623', label: '⏳ Pending' },
    { val: 'Diproses', color: '#3584e4', label: '🔧 Diproses' },
    { val: 'Selesai', color: '#10b981', label: '✅ Selesai' },
    { val: 'Ditolak', color: '#e05c5c', label: '❌ Ditolak' },
  ];

  function openUpdate(id) {
    const d = getData().find(x => x.id === id);
    if (!d) return;
    currentId = id;
    selectedStatus = d.status;
    document.getElementById('updateNoPengajuan').textContent = d.no_pengajuan;
    document.getElementById('catatanAdmin').value = d.catatan_admin || '';

    document.getElementById('statusOpts').innerHTML = statusOpts.map(s => `
      <div class="status-opt ${d.status === s.val ? 'selected' : ''}" onclick="selectStatus('${s.val}')">
        <span class="status-dot" style="background:${s.color};"></span>
        ${s.label}
      </div>
    `).join('');

    document.getElementById('modalUpdate').classList.add('show');
  }

  function selectStatus(val) {
    selectedStatus = val;
    document.querySelectorAll('.status-opt').forEach(el => {
      el.classList.toggle('selected', el.textContent.trim().includes(val));
    });
  }

  function saveStatus() {
    if (!selectedStatus || !currentId) return;
    const data = getData();
    const idx = data.findIndex(x => x.id === currentId);
    if (idx === -1) return;
    data[idx].status = selectedStatus;
    data[idx].catatan_admin = document.getElementById('catatanAdmin').value;
    data[idx].updated_at = new Date().toISOString();
    saveData(data);
    closeModal('modalUpdate');
    renderTable();
    showToast('Status berhasil diperbarui!');
  }

  // ---- Hapus ----
  function openHapus(id) {
    const d = getData().find(x => x.id === id);
    if (!d) return;
    currentId = id;
    document.getElementById('hapusNo').textContent = d.no_pengajuan;
    document.getElementById('modalHapus').classList.add('show');
  }

  function confirmHapus() {
    const data = getData().filter(x => x.id !== currentId);
    saveData(data);
    closeModal('modalHapus');
    renderTable();
    showToast('Data berhasil dihapus.');
  }

  // ---- Utils ----
  function closeModal(id) { document.getElementById(id).classList.remove('show'); }
  function resetFilter() {
    document.getElementById('searchInput').value = '';
    document.getElementById('filterStatus').value = '';
    document.getElementById('filterJenis').value = '';
    renderTable();
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
  }

  document.getElementById('searchInput').addEventListener('input', renderTable);
  document.getElementById('filterStatus').addEventListener('change', renderTable);
  document.getElementById('filterJenis').addEventListener('change', renderTable);

  renderTable();
</script>
</body>
</html>
