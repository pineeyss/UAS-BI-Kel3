<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - MIS Perbaikan Jalan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-card">
        <h2>Sistem Informasi Manajemen</h2>
        <p>Monitoring Pengajuan Jalan</p>
        <form id="formLogin">
            <input type="text" id="user" placeholder="Username (admin)" required>
            <input type="password" id="pass" placeholder="Password (123)" required>
            <button type="submit">MASUK</button>
            <p id="pesan" style="color:red; display:none; margin-top:10px;">Akses Ditolak!</p>
        </form>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', function(e) {
            e.preventDefault();
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            if (u === "admin" && p === "123") {
                localStorage.setItem("sesi_login", "aktif");
                // replace digunakan untuk memutus loop back/forward
                window.location.replace("dashboard.html");
            } else {
                document.getElementById('pesan').style.display = 'block';
            }
        });
    </script>
</body>
</html>
