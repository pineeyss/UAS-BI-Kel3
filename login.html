<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Monitoring Perbaikan Jalan</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0b1f3a;
    --navy-mid: #122947;
    --blue: #1a5fb4;
    --blue-light: #3584e4;
    --gold: #f5a623;
    --gold-light: #fcc34b;
    --white: #ffffff;
    --gray-soft: #e8edf5;
    --gray-text: #6b7a99;
    --danger: #e05c5c;
  }

  body {
    min-height: 100vh;
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Sora', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Background animated pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 80%, rgba(26,95,180,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(245,166,35,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  .road-lines {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 120px;
    overflow: hidden;
    pointer-events: none;
  }
  .road-lines::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 40px;
    background: #1a2a40;
  }
  .road-lines::after {
    content: '';
    position: absolute;
    bottom: 12px;
    left: -100%;
    width: 300%;
    height: 4px;
    background: repeating-linear-gradient(90deg, var(--gold) 0px, var(--gold) 60px, transparent 60px, transparent 120px);
    animation: roadMove 3s linear infinite;
  }
  @keyframes roadMove { to { transform: translateX(120px); } }

  .login-wrap {
    width: 420px;
    position: relative;
    z-index: 10;
    padding: 20px;
  }

  .brand {
    text-align: center;
    margin-bottom: 32px;
  }
  .brand-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--blue), var(--blue-light));
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
    box-shadow: 0 8px 32px rgba(26,95,180,0.4);
  }
  .brand-icon svg { width: 38px; height: 38px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .brand h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.3;
  }
  .brand p {
    font-size: 12px;
    color: var(--gray-text);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
  }

  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 36px;
    backdrop-filter: blur(20px);
    box-shadow: 0 24px 80px rgba(0,0,0,0.4);
  }

  .card h2 {
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 6px;
  }
  .card .subtitle { font-size: 13px; color: var(--gray-text); margin-bottom: 28px; }

  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .input-wrap { position: relative; }
  .input-wrap svg {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px;
    stroke: var(--gray-text); fill: none; stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round;
    pointer-events: none;
  }
  .form-group input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 14px 12px 42px;
    font-size: 14px;
    font-family: 'Sora', sans-serif;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .form-group input::placeholder { color: rgba(255,255,255,0.25); }
  .form-group input:focus {
    border-color: var(--blue-light);
    background: rgba(255,255,255,0.09);
  }

  .alert-error {
    background: rgba(224,92,92,0.12);
    border: 1px solid rgba(224,92,92,0.3);
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 13px;
    color: #f08080;
    margin-bottom: 18px;
    display: none;
  }
  .alert-error.show { display: flex; align-items: center; gap: 8px; }

  .btn-login {
    width: 100%;
    background: linear-gradient(135deg, var(--blue), var(--blue-light));
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Sora', sans-serif;
    color: white;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
    letter-spacing: 0.3px;
  }
  .btn-login:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(26,95,180,0.45);
  }
  .btn-login:active { transform: translateY(0); }

  .hints {
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  .hints p { font-size: 11px; color: var(--gray-text); text-align: center; margin-bottom: 8px; }
  .hint-row {
    display: flex; gap: 8px; justify-content: center;
  }
  .hint-badge {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: rgba(255,255,255,0.5);
  }
  .hint-badge b { color: var(--gold); }
</style>
</head>
<body>
<div class="road-lines"></div>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M3 17l3-10 3 5 3-8 3 6 3-3"/><rect x="1" y="17" width="22" height="4" rx="1"/></svg>
    </div>
    <h1>Monitoring Perbaikan Jalan</h1>
    <p>Management Information System</p>
  </div>

  <div class="card">
    <h2>Masuk ke Sistem</h2>
    <p class="subtitle">Masukkan kredensial akun Anda untuk melanjutkan</p>

    <div class="alert-error" id="alertError">
      <svg viewBox="0 0 24 24" style="width:16px;height:16px;flex-shrink:0;stroke:#f08080;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errorMsg">Username atau password salah!</span>
    </div>

    <div class="form-group">
      <label>Username</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input type="text" id="username" placeholder="Masukkan username" autocomplete="off">
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" placeholder="Masukkan password">
      </div>
    </div>

    <button class="btn-login" onclick="doLogin()">Masuk ke Dashboard</button>

    <div class="hints">
      <p>Akun demo yang tersedia:</p>
      <div class="hint-row">
        <div class="hint-badge"><b>admin</b> / admin123</div>
        <div class="hint-badge"><b>user</b> / user123</div>
      </div>
    </div>
  </div>
</div>

<script>
  const USERS = [
    { id: 1, nama: 'Administrator', username: 'admin', password: 'admin123', role: 'admin' },
    { id: 2, nama: 'User Umum', username: 'user', password: 'user123', role: 'user' }
  ];

  // Init localStorage
  if (!localStorage.getItem('mpj_pengajuan')) {
    localStorage.setItem('mpj_pengajuan', JSON.stringify([]));
  }

  // Check already logged in
  if (sessionStorage.getItem('mpj_user')) {
    window.location.href = 'dashboard.html';
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function doLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    const user = USERS.find(x => x.username === u && x.password === p);
    if (user) {
      sessionStorage.setItem('mpj_user', JSON.stringify(user));
      window.location.href = 'dashboard.html';
    } else {
      document.getElementById('alertError').classList.add('show');
    }
  }
</script>
</body>
</html>
