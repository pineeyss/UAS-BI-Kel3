<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script>
        // PROTEKSI: Cek sebelum render apa pun
        if (localStorage.getItem("sesi_login") !== "aktif") {
            window.location.replace("login.html");
        }
    </script>
    <title>Dashboard MIS - Perbaikan Jalan</title>
    <link rel="stylesheet" href="style.css">
    <!-- Library CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
</head>
<body>
    <div class="sidebar">
        <h3>MIS - JALAN</h3>
        <nav>
            <a href="#" class="active">Dashboard</a>
            <a href="#" onclick="keluar()">Log Out</a>
        </nav>
    </div>

    <div class="content">
        <header>
            <h1>Monitoring Pengajuan Perbaikan</h1>
            <p>Data Sumber: <i>data_kerusakan_jalan_clean.csv</i></p>
        </header>

        <div class="mis-cards">
            <div class="card">
                <h4>Total Pengajuan</h4>
                <h2 id="txtTotal">0</h2>
            </div>
            <div class="card urgent">
                <h4>Prioritas Tinggi</h4>
                <h2 id="txtUrgent">0</h2>
            </div>
        </div>

        <table class="mis-table">
            <thead>
                <tr>
                    <th>ID Gambar</th>
                    <th>Jumlah Lubang</th>
                    <th>Koordinat</th>
                    <th>Status MIS</th>
                </tr>
            </thead>
            <tbody id="isiTabel">
                <!-- Data akan muncul di sini -->
            </tbody>
        </table>
    </div>

    <script src="app.js"></script>
    <script>
        function keluar() {
            localStorage.clear();
            window.location.replace("login.html");
        }
    </script>
</body>
</html>
